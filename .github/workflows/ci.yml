name: CI — Test, Build & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Backend unit tests
  # ─────────────────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lineage
          POSTGRES_PASSWORD: lineage_pass
          POSTGRES_DB: lineage_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://lineage:lineage_pass@localhost:5432/lineage_test

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://lineage:lineage_pass@localhost:5432/lineage_test
          DATABASE_URL_DIRECT: postgresql://lineage:lineage_pass@localhost:5432/lineage_test

      - name: Run Vitest unit tests
        run: npm test -- --reporter=verbose
        env:
          DATABASE_URL: postgresql://lineage:lineage_pass@localhost:5432/lineage_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-for-ci
          ENCRYPTION_KEY: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
          NODE_ENV: test

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Frontend build + type check
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_SITE_URL: https://lineage.ai

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Playwright E2E tests
  # ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lineage
          POSTGRES_PASSWORD: lineage_pass
          POSTGRES_DB: lineage_e2e
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Run DB migrations
        run: npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: postgresql://lineage:lineage_pass@localhost:5432/lineage_e2e
          DATABASE_URL_DIRECT: postgresql://lineage:lineage_pass@localhost:5432/lineage_e2e

      - name: Start backend
        run: node src/index.js &
        working-directory: backend
        env:
          DATABASE_URL: postgresql://lineage:lineage_pass@localhost:5432/lineage_e2e
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: e2e-test-secret
          ENCRYPTION_KEY: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
          FRONTEND_URL: http://localhost:5173
          PORT: 3001

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Install Playwright
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Blue-Green Deploy to Vercel (frontend) + Railway/Render (backend)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy frontend to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: '--prod'

      # Blue-Green: deploy to staging slot first, smoke test, then swap
      - name: Deploy backend (staging slot)
        run: |
          curl -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK_STAGING }}" \
            -H "Content-Type: application/json" \
            -d '{"branch": "main"}'

      - name: Smoke test staging
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.STAGING_URL }}/api/health")
          if [ "$STATUS" != "200" ]; then
            echo "Staging smoke test failed with status $STATUS"
            exit 1
          fi
          echo "Staging smoke test passed"

      - name: Promote staging to production
        run: |
          curl -X POST "${{ secrets.RAILWAY_PROMOTE_HOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"from": "staging", "to": "production"}'

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":rocket: Lineage AI deployed to production successfully!\nCommit: ${{ github.sha }}\nBy: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":x: Lineage AI deployment FAILED!\nCommit: ${{ github.sha }}\nBy: ${{ github.actor }}\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
